# Reusable ClusterClass that defines the standard child-cluster blueprint for this package.


apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
# Reusable Cluster API blueprint shared across child clusters.
metadata:
  # Name of the reusable ClusterClass that child clusters reference through spec.topology.class.
  name: nvidia-ai-baremetal
  namespace: fleet
# Templates used to build control-plane and worker resources.
spec:
  # Infrastructure template reference used by the class.
  infrastructure:
    # Template object referenced by the ClusterClass.
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: Metal3ClusterTemplate
      name: nvidia-ai-baremetal-cluster-template

  # Control-plane template reference for clusters that use this class.
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: KubeadmControlPlaneTemplate
      name: nvidia-ai-kcp-template

  # Worker-class templates and deployment classes.
  workers:
    # Reusable worker deployment classes available to clusters.
    machineDeployments:
      - class: gpu-workers
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
              kind: KubeadmConfigTemplate
              name: nvidia-ai-worker-bootstrap-template
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
              kind: Metal3MachineTemplate
              name: nvidia-ai-worker-machine-template

  variables:
    - name: kubernetesVersion
      required: true
      schema:
        openAPIV3Schema:
          type: string
    - name: controlPlaneReplicas
      required: true
      schema:
        openAPIV3Schema:
          type: integer
    - name: workerReplicas
      required: true
      schema:
        openAPIV3Schema:
          type: integer

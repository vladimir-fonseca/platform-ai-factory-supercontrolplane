# Authored BareMetalHost inventory managed by the super-control-plane.
# This top-level core folder composes child modules, each of which follows the same `core/values` pattern.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Namespace that scopes inventory objects owned by the management plane.
  - namespace
  # Hopper-class inventory such as H100 systems.
  - hopper
  # Blackwell-class inventory such as B200 systems.
  - blackwell
  # Blackwell Ultra-class inventory such as GB200 systems.
  - blackwell-ultra

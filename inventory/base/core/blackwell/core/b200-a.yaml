# BareMetalHost inventory entry used by the management plane to map physical servers into cluster blueprints.


apiVersion: metal3.io/v1alpha1
kind: BareMetalHost
# BareMetalHost inventory object tracked by Metal3.
metadata:
  # Example host inventory object.
  name: b200-a
  namespace: metal3-inventory
  # Host classification labels used by scheduling and cluster templates.
  labels:
    gpu-family.nvidia.com/name: "b200"
    platform-profile: "nvidia-ai"
# Provisioning intent for the physical host.
spec:
  online: true
  bootMACAddress: "00:11:22:33:44:20"
  # Out-of-band management endpoint and credentials.
  bmc:
    address: "redfish-virtualmedia://bmc.b200-a.example.com/redfish/v1/Systems/System.Embedded.1"
    credentialsName: "b200-a-bmc-credentials"
  image:
    url: "https://images.example.com/metal3/b200-host.qcow2"
    checksum: "http://images.example.com/metal3/b200-host.qcow2.sha256"
  # Hint the disk that should be used as the installation target.
  rootDeviceHints:
    deviceName: "/dev/nvme0n1"

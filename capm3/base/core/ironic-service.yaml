# Service that exposes the Ironic API endpoint inside the management cluster.


apiVersion: v1
kind: Service
# ClusterIP service for the Ironic API used by Metal3 and CAPM3.
metadata:
  name: ironic
  namespace: capm3-system
spec:
  selector:
    app.kubernetes.io/name: ironic
  ports:
    - name: api
      port: 6385
      targetPort: api

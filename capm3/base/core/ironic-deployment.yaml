# Ironic deployment that provides the bare-metal provisioning API required by Metal3 and CAPM3.


apiVersion: apps/v1
kind: Deployment
# Deployment that runs the Ironic service inside the management cluster.
metadata:
  name: ironic
  namespace: capm3-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ironic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ironic
    spec:
      containers:
        - name: ironic
          # Keep the shared base neutral. Environment overlays patch the validated image reference.
          image: registry.example.com/platform/ironic:latest
          ports:
            - containerPort: 6385
              name: api
          env:
            # Example in-memory SQLite backend for a reference scaffold.
            - name: DATABASE_URL
              value: sqlite:////shared/ironic.db
          volumeMounts:
            - name: ironic-data
              mountPath: /shared
      volumes:
        - name: ironic-data
          emptyDir: {}

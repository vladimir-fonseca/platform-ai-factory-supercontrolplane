# Namespace resources and supporting services required before the CAPM3 provider is installed.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Namespace for CAPM3 and its supporting infrastructure controllers.
  - namespace.yaml
  # Ironic deployment and service required for Metal3 bare-metal provisioning.
  - ironic-deployment.yaml
  # ClusterIP service that exposes the Ironic API to Metal3 and CAPM3 controllers.
  - ironic-service.yaml

# Development overlay entrypoint for the CAPM3 management-plane layer.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Start from the shared CAPM3 base.
  - ../../base
patches:
  # Keep controller image pinning in the overlay rather than the shared base.
  - path: patch-values-file.yaml
  - path: patch-ironic-image.yaml

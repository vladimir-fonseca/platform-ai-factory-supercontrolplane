# Patch the CAPM3 overlay kustomization so the controller image pins are defined at the overlay level.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: capm3
    releaseName: capm3
    namespace: capm3-system
    repo: oci://registry.example.com/platform/charts
    version: 1.10.0
    valuesFile: values-capm3-overlay.yaml

# Patch the Ironic deployment image in the overlay so the validated controller/runtime image pin lives at the overlay boundary.


apiVersion: apps/v1
kind: Deployment
metadata:
  name: ironic
  namespace: capm3-system
spec:
  template:
    spec:
      containers:
        - name: ironic
          image: registry.example.com/platform/ironic:1.10.0

# Kyverno policy in the management cluster policy layer.


apiVersion: kyverno.io/v1
kind: ClusterPolicy
# Singleton Kyverno or GPU policy object depending on the API group.
metadata:
  name: require-seccomp-and-runasnonroot
# Desired policy behavior enforced by the controller.
spec:
  validationFailureAction: Enforce
  background: true
  # Policy rules evaluated against matching resources.
  rules:
    - name: require-pod-security-context
      # Resource match criteria for the rule.
      match:
        any:
          - resources:
              kinds: ["Pod"]
      # Resource exclusions that should not trigger the rule.
      exclude:
        any:
          - resources:
              namespaces: ["kube-system","kyverno","argocd"]
      # Validation behavior enforced by the policy rule.
      validate:
        message: "Pods must use RuntimeDefault seccomp and runAsNonRoot."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: "*"
                securityContext:
                  runAsNonRoot: true
                  readOnlyRootFilesystem: true

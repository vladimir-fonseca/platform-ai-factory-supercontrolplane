# Kyverno policy in the management cluster policy layer.


apiVersion: kyverno.io/v1
kind: ClusterPolicy
# Singleton Kyverno policy object that turns child-cluster kubeconfig secrets into Argo CD cluster secrets.
metadata:
  # Generate an Argo CD cluster-registration secret from a child-cluster kubeconfig secret.
  name: generate-argocd-cluster-secret-from-child-kubeconfig
  annotations:
    policies.kyverno.io/title: Generate Argo CD cluster secret from child kubeconfig
    policies.kyverno.io/category: Argo CD, Cluster Registration
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Secret, Argo CD, Cluster Registration
    policies.kyverno.io/description: >-
      Watches for child-cluster kubeconfig secrets, decodes and parses the kubeconfig,
      and generates the matching Argo CD cluster secret in the argocd namespace so the
      ApplicationSet can target the new child cluster automatically.
# Desired policy behavior enforced by the controller.
spec:
  generateExistingOnPolicyUpdate: true
  # Policy rules evaluated against matching resources.
  rules:
    - name: generate-cluster-secret
      # Resource match criteria for the rule.
      match:
        any:
          - resources:
              kinds:
                - Secret
              names:
                - "*-kubeconfig"
      # Resource exclusions that should not trigger the rule.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - default
                - kyverno
                - argocd
      # Derived variables or lookups used by the rule logic.
      context:
        - name: clusterName
          variable:
            # Strip the kubeconfig suffix to derive the child-cluster name.
            value: "{{ replace_all('{{ request.object.metadata.name }}', '-kubeconfig', '') }}"
            jmesPath: "to_string(@)"
        - name: environment
          variable:
            # Preserve the environment label from the source kubeconfig secret where present.
            value: "{{ request.object.metadata.labels.environment || 'unknown' }}"
        - name: gpuFamily
          variable:
            # Preserve the GPU family label from the source kubeconfig secret where present.
            value: "{{ request.object.metadata.labels.'gpu-family.nvidia.com/name' || '' }}"
        - name: kubeconfigB64
          variable:
            # Accept either Cluster API secret shape: .data.value or .data.kubeconfig.
            value: "{{ request.object.data.value || request.object.data.kubeconfig || '' }}"
        - name: kubeconfigYaml
          variable:
            # Decode the kubeconfig so Kyverno can inspect the embedded endpoint and credentials.
            jmesPath: "base64_decode(kubeconfigB64)"
        - name: kubeconfig
          variable:
            # Parse the kubeconfig YAML into a structured object for field extraction.
            jmesPath: "parse_yaml(kubeconfigYaml)"
        - name: apiServer
          variable:
            # Extract the real API server endpoint from the kubeconfig rather than constructing it from a naming convention.
            jmesPath: "kubeconfig.clusters[0].cluster.server"
        - name: caData
          variable:
            # Extract the CA bundle used by the child-cluster kubeconfig.
            jmesPath: "kubeconfig.clusters[0].cluster.'certificate-authority-data' || ''"
        - name: bearerToken
          variable:
            # Extract a bearer token when the kubeconfig uses token-based authentication.
            jmesPath: "kubeconfig.users[0].user.token || ''"
        - name: clientCertData
          variable:
            # Extract the client certificate when the kubeconfig uses client-certificate authentication.
            jmesPath: "kubeconfig.users[0].user.'client-certificate-data' || ''"
        - name: clientKeyData
          variable:
            # Extract the client key when the kubeconfig uses client-certificate authentication.
            jmesPath: "kubeconfig.users[0].user.'client-key-data' || ''"
      # Generated object definition emitted by the policy rule.
      generate:
        apiVersion: v1
        kind: Secret
        # Prefix the generated secret so the object identity is obvious in the Argo CD namespace.
        name: "cluster-{{ clusterName }}"
        namespace: argocd
        synchronize: true
        data:
          kind: Secret
          metadata:
            labels:
              argocd.argoproj.io/secret-type: cluster
              platform-profile: nvidia-ai
              environment: "{{ environment }}"
              generated-by: kyverno
              gpu-family.nvidia.com/name: "{{ gpuFamily }}"
          type: Opaque
          stringData:
            # Human-readable cluster name shown by Argo CD.
            name: "{{ clusterName }}"
            # Real API server endpoint extracted from the kubeconfig.
            server: "{{ apiServer }}"
            # Argo CD connection config generated from the kubeconfig credentials.
            config: |
              {
                "bearerToken": "{{ bearerToken }}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "{{ caData }}",
                  "certData": "{{ clientCertData }}",
                  "keyData": "{{ clientKeyData }}"
                }
              }

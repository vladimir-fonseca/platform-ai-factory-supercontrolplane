# Kyverno policy in the management cluster policy layer.


apiVersion: kyverno.io/v1
kind: ClusterPolicy
# Singleton Kyverno or GPU policy object depending on the API group.
metadata:
  name: enforce-namespace-pod-security
# Desired policy behavior enforced by the controller.
spec:
  validationFailureAction: Enforce
  background: true
  # Policy rules evaluated against matching resources.
  rules:
    - name: require-psa-labels
      # Resource match criteria for the rule.
      match:
        any:
          - resources:
              kinds: ["Namespace"]
      # Resource exclusions that should not trigger the rule.
      exclude:
        any:
          - resources:
              names: ["kube-system","kube-public","kube-node-lease","argocd","kyverno"]
      # Validation behavior enforced by the policy rule.
      validate:
        message: "Namespaces must define Pod Security Admission labels."
        pattern:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: restricted
              pod-security.kubernetes.io/enforce-version: latest
              pod-security.kubernetes.io/audit: restricted
              pod-security.kubernetes.io/warn: restricted

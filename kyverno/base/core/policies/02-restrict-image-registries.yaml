# Kyverno policy in the management cluster policy layer.


apiVersion: kyverno.io/v1
kind: ClusterPolicy
# Singleton Kyverno or GPU policy object depending on the API group.
metadata:
  name: restrict-image-registries
# Desired policy behavior enforced by the controller.
spec:
  validationFailureAction: Enforce
  background: true
  # Policy rules evaluated against matching resources.
  rules:
    - name: approved-registries
      # Resource match criteria for the rule.
      match:
        any:
          - resources:
              kinds: ["Pod"]
      # Resource exclusions that should not trigger the rule.
      exclude:
        any:
          - resources:
              namespaces: ["kube-system","kyverno","argocd"]
      # Validation behavior enforced by the policy rule.
      validate:
        message: "Images must come from approved registries only."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: NotMatches
                    value: '^(registry\.example\.com|nvcr\.io|ghcr\.io/kyverno)/.*(@sha256:[a-f0-9]{64}|:.*)?$'

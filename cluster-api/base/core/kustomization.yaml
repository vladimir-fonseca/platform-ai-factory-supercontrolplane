# Authored namespace resources required before the Cluster API providers are installed.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Namespace for Cluster API core controllers.
  - ns-capi.yaml
  # Namespace for kubeadm bootstrap provider controllers.
  - ns-kubeadm-bootstrap.yaml
  # Namespace for kubeadm control-plane provider controllers.
  - ns-kubeadm-control-plane.yaml

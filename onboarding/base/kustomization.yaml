# Base composition for the onboarding layer.
# Keep authored onboarding resources under `base/core/` and reserve `base/values/` for future shared parameters.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Onboarding is expressed through authored RBAC, ConfigMap, and Job resources.
  - core

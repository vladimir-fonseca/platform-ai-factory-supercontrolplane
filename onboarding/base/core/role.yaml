# RBAC role that scopes what the onboarding automation can read or create.


apiVersion: rbac.authorization.k8s.io/v1
kind: Role
# Namespaced RBAC role for onboarding automation.
metadata:
  name: argocd-cluster-register
  namespace: argocd
# API permissions granted to this role.
rules:
  # Read kubeconfigs and create/update cluster secrets.
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]

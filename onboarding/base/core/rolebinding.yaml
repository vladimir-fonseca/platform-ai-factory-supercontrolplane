# RBAC binding that grants the onboarding job the role it needs to create or read registration objects.


apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
# Binds a service account to a namespaced RBAC role.
metadata:
  name: argocd-cluster-register
  namespace: argocd
# Identities that receive the RBAC permissions.
subjects:
  - kind: ServiceAccount
    name: argocd-cluster-register
    namespace: argocd
# Role granted to the listed subjects.
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-cluster-register

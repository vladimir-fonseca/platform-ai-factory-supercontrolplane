# Example Argo CD repository credential Secret.


apiVersion: v1
kind: Secret
# Secret template used to supply Argo CD with repository credentials.
metadata:
  # Stable secret name referenced by the environment-specific Argo CD bootstrap or repository configuration.
  name: argocd-repo-credentials
  namespace: argocd
  labels:
    # Mark the object as a template rather than an environment-ready Secret.
    secret-pattern.nvidia.com/class: argocd-repo
type: Opaque
stringData:
  # Replace with the real Git repository URL used by the environment.
  url: https://git.example.com/platform-ai-factory-supercontrolplane.git
  # Replace with the real username or token identifier.
  username: REPLACE_ME
  # Replace with the real password or access token.
  password: REPLACE_ME

# Example OCI registry pull Secret for Helm charts or container images.


apiVersion: v1
kind: Secret
# Secret template used for OCI registry authentication.
metadata:
  # Stable secret name that environment-specific automation can attach where needed.
  name: example-oci-registry-pull-secret
  namespace: capm3-system
  labels:
    # Mark the object as a template rather than an environment-ready Secret.
    secret-pattern.nvidia.com/class: oci-registry
type: kubernetes.io/dockerconfigjson
stringData:
  # Replace with a real dockerconfigjson payload for the OCI registry in use.
  .dockerconfigjson: REPLACE_ME

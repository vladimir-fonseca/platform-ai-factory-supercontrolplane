# Example BMC credential Secret for a Metal3 BareMetalHost.


apiVersion: v1
kind: Secret
# Secret template used by BareMetalHost objects for Redfish or IPMI credentials.
metadata:
  # Stable secret name referenced by the BareMetalHost credentialName field.
  name: example-bmc-credentials
  namespace: metal3-inventory
  labels:
    # Mark the object as a template rather than an environment-ready Secret.
    secret-pattern.nvidia.com/class: bmc-credentials
type: Opaque
stringData:
  # Replace with the real BMC username.
  username: REPLACE_ME
  # Replace with the real BMC password.
  password: REPLACE_ME

# Patch that keeps the Blackwell production posture on full GPUs until a workload-qualified MIG geometry is chosen.


apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  # Patch the shared GPU operator ClusterPolicy object rather than creating a second policy.
  name: gpu-cluster-policy
spec:
  # Keep full GPU presentation as the production-safe default for B200-class clusters.
  mig:
    strategy: none
  migManager:
    # Enable the manager so the cluster can adopt a validated MIG geometry later without changing the control path.
    enabled: true

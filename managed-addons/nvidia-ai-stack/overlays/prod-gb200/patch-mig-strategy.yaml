# Patch that keeps the GB200 rack-scale posture on full GPUs and disables MIG management.


apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  # Patch the shared GPU operator ClusterPolicy object rather than creating a second policy.
  name: gpu-cluster-policy
spec:
  # Present full GPUs for NVLink mesh-oriented rack-scale operation.
  mig:
    strategy: none
  migManager:
    enabled: false

# Family-specific production overlay for Hopper-class clusters that should expose MIG-partitioned H100 GPUs.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Start from the neutral production overlay and then add the family-specific MIG posture.
  - ../prod
patches:
  # Replace the base full-GPU posture with the family-specific MIG profile.
  - path: patch-mig-strategy.yaml

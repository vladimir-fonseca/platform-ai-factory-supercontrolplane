# Production overlay entrypoint for the neutral child-cluster NVIDIA AI stack.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Start from the shared child-cluster NVIDIA AI stack.
  - ../../base
patches:
  # Keep operator/runtime image pinning in the overlay rather than the shared base.
  - path: patch-values-file.yaml
  # Replace the shared-base DPF sizing and flavor placeholders with the neutral production profile.
  - path: patch-dpf-profile.yaml
  # Keep DOCA service template versions at the overlay boundary.
  - path: patch-doca-template-versions.yaml

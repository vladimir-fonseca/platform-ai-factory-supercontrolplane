apiVersion: svc.dpu.nvidia.com/v1alpha1
kind: DPUServiceConfiguration
# Concrete configuration instance for a DPU service template.
metadata:
  name: snap-block-nvme
  namespace: dpf-operator-system
# Desired runtime parameters for this DPU service.
spec:
  serviceConfiguration:
    storage:
      # VAST NVMe/TCP target values for the NVMe-emulated block service.
      targetAddress: vast-nvme-vip.storage.example.com
      targetPort: 4420
      subsystemNQN: nqn.2026-01.com.example:vastera.ai.factory.nvme01

apiVersion: svc.dpu.nvidia.com/v1alpha1
kind: DPUServiceConfiguration
# Concrete configuration instance for a DPU service template.
metadata:
  name: snap-virtiofs
  namespace: dpf-operator-system
# Desired runtime parameters for this DPU service.
spec:
  serviceConfiguration:
    storage:
      # VAST NFS endpoint for the shared POSIX path.
      nfsServer: vast-nfs-vip.storage.example.com
      nfsExportPath: /vast/ai/shared

      # Multipath client behavior. Validate the exact mount option support in
      # the service chart / container image for your environment.
      mountOptions:
        - vers=3
        - remoteports=dns

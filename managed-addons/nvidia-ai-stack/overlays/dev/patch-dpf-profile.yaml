# Patch that replaces the shared-base DPF sizing and flavor placeholders with a
# family- and site-oriented example profile for the `dev` overlay.


apiVersion: provisioning.dpu.nvidia.com/v1alpha1
kind: DPUCluster
metadata:
  # Patch the shared DPU cluster object rather than introducing a second object.
  name: dpu-cluster-a
  namespace: dpf-operator-system
spec:
  # Small development profile aligned to Hopper-class evaluation clusters.
  maxNodes: 8
---
# Patch that replaces the shared-base DPU flavor placeholder with the `hopper-dev` example profile.
apiVersion: provisioning.dpu.nvidia.com/v1alpha1
kind: DPUSet
metadata:
  # Patch the shared DPU set object rather than introducing a second object.
  name: dpu-set-a
  namespace: dpf-operator-system
spec:
  # Replace this example with the exact DPF flavor name validated for the release you deploy.
  dpuFlavor: hopper-dev

# Patch the managed-addons overlay kustomization so operator/runtime values are defined at the overlay boundary.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: cilium
    releaseName: cilium
    namespace: kube-system
    repo: https://helm.cilium.io/
    version: 1.19.2
    valuesFile: values-managed-addons-overlay.yaml
  - name: kubevirt-operator
    releaseName: kubevirt-operator
    namespace: kubevirt
    repo: oci://registry.example.com/platform/charts
    version: 1.8.1
    valuesFile: values-managed-addons-overlay.yaml
  - name: cdi-operator
    releaseName: cdi-operator
    namespace: cdi
    repo: oci://registry.example.com/platform/charts
    version: 1.61.0
    valuesFile: values-managed-addons-overlay.yaml
  - name: gpu-operator
    releaseName: gpu-operator
    namespace: gpu-operator
    repo: https://helm.ngc.nvidia.com/nvidia
    version: v26.3.0
    valuesFile: values-managed-addons-overlay.yaml
  - name: dpf-operator
    releaseName: dpf-operator
    namespace: dpf-operator-system
    repo: https://helm.ngc.nvidia.com/nvidia/doca
    version: v25.7.1
    valuesFile: values-managed-addons-overlay.yaml

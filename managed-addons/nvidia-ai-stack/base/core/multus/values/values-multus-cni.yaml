# Helm values for the child-cluster Multus deployment.
# Install Multus as a secondary-network control plane for pods and KubeVirt VMs.


namespaceOverride: multus-system
multus:
  # Use the thicker deployment mode that installs Multus components in-cluster.
  cniConf:
    confDir: /host/etc/cni/net.d
    binDir: /host/opt/cni/bin
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
config:
  cni_conf:
    confDir: /host/etc/cni/net.d
    binDir: /host/opt/cni/bin

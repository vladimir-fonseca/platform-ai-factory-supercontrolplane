# Example SR-IOV-backed secondary network consumed through Multus.


apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  # NAD name used by pod annotations or KubeVirt interfaces.
  name: tenant-b-sriov
  namespace: default
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "tenant-b-sriov",
      "type": "sriov",
      "resourceName": "nvidia.com/tenant_b_sriov",
      "vlan": 220,
      "spoofchk": "off",
      "trust": "on"
    }

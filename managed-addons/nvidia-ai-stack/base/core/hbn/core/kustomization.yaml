# Authored HBN / OVN networking resources separated from the generic DPU services layer.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Namespace used by the HBN service objects and integration settings.
  - namespace.yaml
  # Reviewed OVN database, bridge-mapping, uplink, and provider-network settings.
  - configmap-hbn-ovn-settings.yaml
  # Reusable HBN service template.
  - dpuservicetemplate-hbn.yaml
  # Concrete HBN runtime configuration.
  - dpuserviceconfiguration-hbn.yaml
  # HBN-focused deployment composition.
  - dpudeployment-hbn.yaml

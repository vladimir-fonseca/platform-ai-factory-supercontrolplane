# DPU deployment composition dedicated to the explicit HBN networking service.


apiVersion: svc.dpu.nvidia.com/v1alpha1
kind: DPUDeployment
metadata:
  name: dpu-deployment-hbn
  namespace: dpf-operator-system
spec:
  dpuCluster:
    name: dpu-cluster-a
  dpuSets:
    - name: dpu-set-a
  services:
    - template:
        name: hbn
      configuration:
        name: hbn

# Reusable DPU service template referenced by child-cluster DPU deployments.


apiVersion: svc.dpu.nvidia.com/v1alpha1
kind: DPUServiceTemplate
# Reusable DPU service template referenced by deployment compositions.
metadata:
  # Host-Based Networking service template.
  name: hbn
  namespace: dpf-operator-system
# Desired service-container and network/storage wiring for a DPU function.
spec:
  deploymentServiceName: hbn
  helmChart:
    source:
      repoURL: https://helm.ngc.nvidia.com/nvidia/doca
      chart: doca-hbn
      version: 1.0.0
    values:
      serviceDaemonSet:
        # DPU services must run on the BlueField Arm cores.
        nodeSelector:
          kubernetes.io/arch: arm64

# Reusable DPU service template referenced by child-cluster DPU deployments.


apiVersion: svc.dpu.nvidia.com/v1alpha1
kind: DPUServiceTemplate
# Reusable DPU service template referenced by deployment compositions.
metadata:
  # SNAP block service with NVMe guest-visible emulation.
  name: snap-block-nvme
  namespace: dpf-operator-system
# Desired service-container and network/storage wiring for a DPU function.
spec:
  deploymentServiceName: snap-block-nvme
  helmChart:
    source:
      repoURL: https://helm.ngc.nvidia.com/nvidia/doca
      chart: doca-snap
      version: 1.0.0
    values:
      # This is still the block service category, but the exposed block-device
      # emulation flavor is NVMe.
      mode: block
      backend: nvme
      emulation: nvme
      serviceDaemonSet:
        nodeSelector:
          kubernetes.io/arch: arm64

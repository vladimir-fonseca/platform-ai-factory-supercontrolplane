# DPU deployment composition for the host-trusted virtio-blk-backed storage profile.


apiVersion: svc.dpu.nvidia.com/v1alpha1
kind: DPUDeployment
metadata:
  # Deployment object that binds the virtio-blk-backed host-trusted services into the selected DPU cluster and DPU set.
  name: dpu-deployment-host-trusted-virtio-blk
  namespace: dpf-operator-system
spec:
  # Target the DPU cluster that runs this deployment profile.
  dpuCluster:
    name: dpu-cluster-a
  # Associate the deployment profile with the provisioned DPU set.
  dpuSets:
    - name: dpu-set-a
  services:
    # Provide the virtio-blk-backed SNAP block service for guest-oriented block exposure.
    - template:
        name: snap-block-virtio-blk
      configuration:
        name: snap-block-virtio-blk
    # Provide the shared virtio-fs service for POSIX-style file sharing.
    - template:
        name: snap-virtiofs
      configuration:
        name: snap-virtiofs

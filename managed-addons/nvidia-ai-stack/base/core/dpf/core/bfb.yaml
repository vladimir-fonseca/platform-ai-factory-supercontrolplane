# DPF control-plane object applied to child clusters that use the NVIDIA DPU stack.


apiVersion: provisioning.dpu.nvidia.com/v1alpha1
kind: BFB
# BlueField boot image reference used when provisioning or reconciling DPUs.
metadata:
  # BlueField bootstream bundle reference.
  name: bf-bundle-prod
  namespace: dpf-operator-system
# Desired BFB artifact source and lifecycle behavior.
spec:
  # Replace with the exact validated BFB for your BlueField generation,
  # host OS, and DPF release.
  url: https://content.mellanox.com/BlueField/BFBs/Ubuntu24.04/bf-bundle-3.2.1-34_25.11_ubuntu-24.04_64k_prod.bfb

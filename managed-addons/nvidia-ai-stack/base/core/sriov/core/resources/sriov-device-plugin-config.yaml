# Device plugin configuration that maps SR-IOV resources into Kubernetes resource names.


apiVersion: v1
kind: ConfigMap
metadata:
  name: sriov-device-plugin-config
  namespace: sriov-system
data:
  config.json: |
    {
      "resourceList": [
        {
          "resourceName": "mgmt_sriov",
          "selectors": {
            "vendors": ["15b3"],
            "isRdma": true,
            "pfNames": ["ens1f0"]
          }
        },
        {
          "resourceName": "tenant_a_sriov",
          "selectors": {
            "vendors": ["15b3"],
            "isRdma": true,
            "pfNames": ["ens1f1"]
          }
        },
        {
          "resourceName": "tenant_b_sriov",
          "selectors": {
            "vendors": ["15b3"],
            "isRdma": true,
            "pfNames": ["ens1f2"]
          }
        }
      ]
    }

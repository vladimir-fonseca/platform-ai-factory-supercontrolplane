# Helm values for the child-cluster SR-IOV Network Operator.


namespace: sriov-system
operator:
  # Keep the SR-IOV operator on worker infrastructure by default.
  nodeSelector:
    node-role.kubernetes.io/worker: ""
sriovOperatorConfig:
  configDaemonNodeSelector:
    node-role.kubernetes.io/worker: ""

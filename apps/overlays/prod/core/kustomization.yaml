# Site-specific app-of-apps overlay core for the `prod` deployment boundary.
# Start from the shared child Application base and apply site-specific patches from the sibling `patches/` folder.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base
patches:
  - path: ../patches/management-cilium.yaml
  - path: ../patches/cluster-api.yaml
  - path: ../patches/capm3.yaml
  - path: ../patches/inventory.yaml
  - path: ../patches/catalog.yaml
  - path: ../patches/kyverno.yaml
  - path: ../patches/onboarding.yaml
  - path: ../patches/services.yaml

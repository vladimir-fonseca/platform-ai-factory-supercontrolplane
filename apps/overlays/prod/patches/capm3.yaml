apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Argo CD Application patch defined in Git for this package.
  name: capm3
  namespace: argocd
spec:
  source:
    # Site-specific path rendered by this Application.
    path: capm3/overlays/prod
  destination:
    # Target Kubernetes API server for this Application.
    server: https://kubernetes.default.svc
    # Namespace where the Application object or managed resources live.
    namespace: capm3-system

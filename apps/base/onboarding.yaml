apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Argo CD Application object defined in Git for this package.
  name: onboarding
  namespace: argocd
  annotations:
    # Roll out this Application in a controlled order.
    argocd.argoproj.io/sync-wave: "0"
spec:
  # Use the package-specific Argo CD project instead of the default project.
  project: ai-nvidia
  source:
    # Git repo that holds the desired state for this Application.
    repoURL: https://git.example.com/platform-ai-factory-supercontrolplane.git
    # Git revision to follow for reconciliation.
    targetRevision: main
    # Path inside the repo that Argo CD will render and apply.
    path: onboarding/overlays/prod
  destination:
    # Target Kubernetes API server for this Application.
    server: https://kubernetes.default.svc
    # Namespace where the Application object or managed resources live.
    namespace: argocd
  syncPolicy:
    automated:
      # Delete managed resources that were removed from Git.
      prune: true
      # Automatically correct drift between Git and the live cluster.
      selfHeal: true
    syncOptions:
      # Create target namespaces automatically if missing.
      - CreateNamespace=true
      # Prefer server-side apply for larger or more complex objects.
      - ServerSideApply=true

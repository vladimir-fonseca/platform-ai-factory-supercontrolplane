# Shared app-of-apps base for the supercontrolplane package family.
# Keep only child Application definitions here. The root bootstrap Application belongs under `bootstrap/`.


apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - management-cilium.yaml
  - cluster-api.yaml
  - capm3.yaml
  - inventory.yaml
  - catalog.yaml
  - kyverno.yaml
  - onboarding.yaml
  - services.yaml
